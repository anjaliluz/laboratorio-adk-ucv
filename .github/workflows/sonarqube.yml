name: SonarQube
on:
  push:
    branches:
      - main
jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies 
        run: poetry install
      - name: Run SonarCloud Scan CLI
        run: |
          npm install -g sonarqube-scanner
          sonar-scanner \
            -Dsonar.organization=anjaliluz \
            -Dsonar.projectKey=anjaliluz_laboratorio-adk-ucv \
            -Dsonar.projectName=laboratorio-adk-ucv \
            -Dsonar.sources=. \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}